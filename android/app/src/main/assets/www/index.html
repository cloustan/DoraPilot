<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dora Pilot Assistant</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Cal+Sans&display=swap");

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background: transparent !important;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
            overflow: hidden;
            color: #fff;
        }

        body.app-mode {
            background: #ffffff url("img/bg.jpg") no-repeat center top / cover !important;
            color: #111827;
            font-family: "Cal Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            body.app-mode {
                background: #05070d url("img/bg.jpg") no-repeat center top / cover !important;
                color: #f8fbff;
            }
        }

        .root {
            position: relative;
            width: 100vw;
            height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
        }

        .gradient-overlay {
            position: absolute;
            
            inset: 0;
            z-index: 0;
            height: calc(100% + var(--kb-offset, 0px));
            transform: translateY(calc(var(--kb-offset, 0px) * -1));
            transition: transform 220ms ease, height 220ms ease;
            background: linear-gradient(
                180deg,
                transparent 0%,
                #00000000 30%,
                #3f6cff 70%,
                #2450e1 85%,
                #0055FF 100%
            );
            animation: overlayFadeIn 520ms ease-out both;
        }

        .content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 32px;
            box-sizing: border-box;
        }

        body.app-mode .content {
            justify-content: flex-start;
            padding-top: 18px;
        }

        body.app-mode .gradient-overlay {
            display: block;
            pointer-events: none;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            background: linear-gradient(
                180deg,
                rgba(236, 245, 255, 0.46) 0%,
                rgba(236, 245, 255, 0.26) 24%,
                rgba(255, 255, 255, 0) 52%,
                rgba(102, 160, 255, 0.18) 72%,
                rgba(49, 112, 255, 0.32) 100%
            );
        }

        body.app-mode.app-screen-greeting .gradient-overlay {
            display: none;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            background: none;
        }

        /* Legacy overlay gradient is intentionally retained above as a visual backup. */
        body:not(.app-mode) .gradient-overlay {
            display: block;
            /* Keep height fixed so the translateY keyboard shift moves the dome anchor up with the IME. */
            height: 100%;
            pointer-events: none;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            background: radial-gradient(
                circle 150vw at 50% 103%,
                rgba(173, 216, 255, 1) 0%,
                rgba(92, 154, 255, 0.98) 26%,
                rgba(0, 85, 255, 0.95) 56%,
                rgba(0, 85, 255, 0.55) 76%,
                rgba(0, 85, 255, 0) 94%
            );
            animation:
                overlayFadeIn 420ms ease-out both,
                overlayGlowPulse 3s ease-in-out 420ms infinite;
        }

        body:not(.app-mode).overlay-closing .gradient-overlay {
            animation: overlayGlowOut 240ms ease-in both;
        }

        body:not(.app-mode).overlay-closing .bottom {
            animation: overlayBarSink 240ms ease-in both;
        }

        @keyframes overlayGlowPulse {
            0%, 100% {
                filter: brightness(1);
            }
            50% {
                filter: brightness(1.16);
            }
        }

        @keyframes overlayGlowOut {
            to {
                opacity: 0;
            }
        }

        @keyframes overlayBarSink {
            to {
                opacity: 0;
                transform: translateY(26px) scale(0.98);
            }
        }

        .overlay-title {
            display: none;
        }

        .dictation-wave {
            display: none;
        }

        body:not(.app-mode) .overlay-title {
            display: block;
            margin: 0 0 72px;
            text-align: center;
            font-family: "Cal Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 30px;
            font-weight: 500;
            letter-spacing: -0.01em;
            color: #ffffff;
            text-shadow: 0 2px 14px rgba(8, 40, 120, 0.35);
        }

        body:not(.app-mode) .overlay-title.is-thinking {
            animation: titlePop 280ms ease-out, titleThinking 1.2s ease-in-out 280ms infinite;
        }

        body:not(.app-mode) .dictation-wave {
            display: none;
        }

        .dictation-wave span {
            width: 16px;
            min-height: 22px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 8px 22px rgba(0, 55, 180, 0.28);
            animation: dictationPulse 760ms ease-in-out infinite;
        }

        .dictation-wave span:nth-child(2) { animation-delay: 80ms; }
        .dictation-wave span:nth-child(3) { animation-delay: 160ms; }
        .dictation-wave span:nth-child(4) { animation-delay: 240ms; }
        .dictation-wave span:nth-child(5) { animation-delay: 320ms; }
        .dictation-wave span:nth-child(6) { animation-delay: 400ms; }
        .dictation-wave span:nth-child(7) { animation-delay: 480ms; }

        @keyframes dictationPulse {
            0%, 100% {
                height: 24px;
                transform: scaleY(0.8);
            }
            50% {
                height: 76px;
                transform: scaleY(1);
            }
        }

        body:not(.app-mode) .overlay-title.is-response {
            font-size: 20px;
            font-weight: 400;
            line-height: 1.5;
            letter-spacing: 0;
            max-height: 44vh;
            overflow-y: auto;
            animation: titlePop 320ms ease-out;
        }

        body:not(.app-mode) .overlay-title.is-response p {
            margin: 0 0 8px;
        }

        body:not(.app-mode) .overlay-title.is-response p:last-child,
        body:not(.app-mode) .overlay-title.is-response ul:last-child,
        body:not(.app-mode) .overlay-title.is-response ol:last-child,
        body:not(.app-mode) .overlay-title.is-response pre:last-child {
            margin-bottom: 0;
        }

        body:not(.app-mode) .overlay-title.is-response ul,
        body:not(.app-mode) .overlay-title.is-response ol {
            margin: 0 0 8px;
            padding-left: 24px;
            text-align: left;
        }

        body:not(.app-mode) .overlay-title.is-response li {
            margin: 3px 0;
        }

        body:not(.app-mode) .overlay-title.is-response code {
            border-radius: 7px;
            background: rgba(255, 255, 255, 0.2);
            padding: 1px 5px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
            font-size: 0.92em;
        }

        body:not(.app-mode) .overlay-title.is-response pre {
            margin: 0 0 8px;
            overflow-x: auto;
            border-radius: 14px;
            background: rgba(8, 25, 80, 0.4);
            padding: 10px 12px;
            text-align: left;
        }

        body:not(.app-mode) .overlay-title.is-response pre code {
            background: transparent;
            padding: 0;
        }

        @keyframes titlePop {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes titleThinking {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        body:not(.app-mode) .content {
            justify-content: flex-end;
            align-items: center;
            padding: 24px;
        }

        body:not(.app-mode) .top-row,
        body:not(.app-mode) .hero-block,
        body:not(.app-mode) .chat-shell {
            display: none;
        }

        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 8px;
            flex-shrink: 0;
            position: relative;
            z-index: 60;
        }

        .back-btn {
            display: none;
            width: 44px;
            height: 40px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.28);
            background: rgba(255, 255, 255, 0.2);
            color: rgba(245, 250, 255, 0.95);
            padding: 0;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
        }

        .back-btn svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 2.2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        body.app-mode.app-screen-chat .back-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .menu-btn {
            width: 48px;
            height: 48px;
            border-radius: 999px;
            border: 0;
            color: #fff;
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.25);
            animation: riseIn 420ms ease-out 80ms both;
            position: relative;
            z-index: 61;
            margin-right: auto;
            cursor: pointer;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .menu-btn::after {
            content: "";
            position: absolute;
            inset: -14px;
        }

        .menu-btn span {
            width: 16px;
            height: 1.5px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.92);
        }

        .bottom {
            width: min(420px, 100%);
            margin: 0 auto calc(64px + var(--kb-offset, 0px));
            transition: margin-bottom 220ms ease;
        }

        body.app-mode .bottom {
            display: flex;
            flex-direction: column;
            position: relative;
            margin: 0 auto calc(64px + var(--kb-offset, 0px));
            min-height: calc(100dvh - 96px - var(--kb-offset, 0px));
        }

        body:not(.app-mode) .bottom {
            width: min(420px, 100%);
            margin: 0 auto calc(44px + var(--kb-offset, 0px));
            align-self: center;
            transition: width 220ms ease, margin-bottom 220ms ease;
        }

        body.app-mode.app-screen-greeting .hero-block {
            position: absolute;
            top: 42%;
            left: 0;
            right: 0;
            transform: translateY(-50%);
            text-align: center;
            pointer-events: none;
            z-index: 3;
        }

        body.app-mode.app-screen-chat .hero-block {
            display: none;
        }

        .chat-shell {
            display: none;
        }

        body.app-mode.app-screen-chat .chat-shell {
            display: flex;
            flex: 1;
            min-height: 0;
            overflow: visible;
            padding: 2px 6px 8px;
        }

        body.app-mode.app-screen-greeting .chat-shell {
            display: none;
        }

        .chat-list {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            overflow-x: visible;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 14px 10px 18px;
            scrollbar-width: none;
        }

        .chat-list::-webkit-scrollbar {
            display: none;
        }

        .chat-empty {
            margin: auto;
            font-size: 14px;
            color: rgba(245, 250, 255, 0.92);
            text-align: center;
            text-shadow: 0 1px 3px rgba(6, 20, 52, 0.45);
        }

        .chat-msg {
            max-width: 84%;
            border-radius: 20px;
            padding: 16px 18px;
            font-size: 15px;
            line-height: 1.5;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            word-break: break-word;
            white-space: pre-wrap;
            box-shadow: 0 8px 22px rgba(20, 40, 86, 0.14);
            margin: 2px 0;
        }

        .chat-msg p {
            margin: 0 0 8px;
        }

        .chat-msg p:last-child,
        .chat-msg ul:last-child,
        .chat-msg ol:last-child,
        .chat-msg pre:last-child {
            margin-bottom: 0;
        }

        .chat-msg ul,
        .chat-msg ol {
            margin: 0 0 8px;
            padding-left: 20px;
        }

        .chat-msg li {
            margin: 3px 0;
        }

        .chat-msg code {
            border-radius: 7px;
            background: rgba(15, 23, 42, 0.08);
            padding: 1px 5px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
            font-size: 0.92em;
        }

        .chat-msg pre {
            margin: 0 0 8px;
            overflow-x: auto;
            border-radius: 14px;
            background: rgba(15, 23, 42, 0.08);
            padding: 10px 12px;
        }

        .chat-msg pre code {
            background: transparent;
            padding: 0;
        }

        .chat-msg strong {
            font-weight: 700;
        }

        .chat-msg-user {
            align-self: flex-end;
            color: rgba(245, 250, 255, 0.97);
            background: rgba(120, 168, 255, 0.24);
            border: 1px solid rgba(205, 226, 255, 0.34);
        }

        .chat-msg-assistant {
            align-self: flex-start;
            color: rgba(245, 250, 255, 0.95);
            background: transparent;
            border: 0;
            box-shadow: none;
            padding: 6px 2px;
            text-shadow: 0 1px 3px rgba(6, 20, 52, 0.5);
        }

        .action-card {
            display: flex;
            align-items: center;
            gap: 12px;
            align-self: flex-start;
            max-width: 84%;
            border-radius: 18px;
            padding: 13px 16px;
            margin: 2px 0;
            color: rgba(245, 250, 255, 0.96);
            background: rgba(120, 168, 255, 0.18);
            border: 1px solid rgba(205, 226, 255, 0.30);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 8px 22px rgba(20, 40, 86, 0.16);
            animation: riseIn 320ms ease-out both;
        }

        .action-card .ac-icon {
            flex: 0 0 auto;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #cfe2ff;
        }

        .action-card .ac-icon svg {
            width: 22px;
            height: 22px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .action-card.is-loading .ac-icon svg {
            animation: ac-spin 0.85s linear infinite;
            transform-origin: 50% 50%;
        }

        .action-card.is-done {
            background: rgba(120, 200, 168, 0.16);
            border-color: rgba(168, 240, 205, 0.32);
        }

        .action-card.is-done .ac-icon {
            color: #7cf0b0;
            animation: ac-pop 360ms ease-out both;
        }

        .action-card.is-error {
            background: rgba(255, 138, 138, 0.16);
            border-color: rgba(255, 190, 190, 0.34);
        }

        .action-card.is-error .ac-icon {
            color: #ff9b9b;
        }

        .action-card .ac-text {
            font-size: 15px;
            line-height: 1.4;
        }

        @keyframes ac-spin {
            to { transform: rotate(360deg); }
        }

        @keyframes ac-pop {
            0% { transform: scale(0.5); opacity: 0.2; }
            60% { transform: scale(1.18); opacity: 1; }
            100% { transform: scale(1); }
        }

        .settings-panel {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: none;
            align-items: flex-end;
            background: rgba(6, 20, 52, 0.42);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .settings-panel.is-open {
            display: flex;
            animation: fadeIn 200ms ease-out both;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .settings-sheet {
            width: 100%;
            max-height: 86%;
            overflow-y: auto;
            border-radius: 26px 26px 0 0;
            padding: 22px 20px calc(28px + env(safe-area-inset-bottom));
            background: rgba(244, 248, 255, 0.92);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            box-shadow: 0 -10px 40px rgba(12, 28, 64, 0.28);
            animation: sheetUp 280ms cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .settings-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .settings-head h2 {
            margin: 0;
            font-size: 20px;
            font-weight: 700;
            color: #16233f;
        }

        .settings-close {
            border: 0;
            background: rgba(20, 40, 86, 0.08);
            color: #16233f;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            font-size: 17px;
            cursor: pointer;
        }

        .settings-note {
            margin: 6px 0 16px;
            font-size: 13px;
            line-height: 1.45;
            color: rgba(22, 35, 63, 0.62);
        }

        .settings-list { display: flex; flex-direction: column; gap: 10px; }

        .settings-row {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.66);
            border: 1px solid rgba(20, 40, 86, 0.08);
        }

        .settings-row .sr-icon {
            flex: 0 0 auto;
            width: 38px;
            height: 38px;
            border-radius: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(90, 140, 255, 0.16);
            color: #2f6bff;
        }

        .settings-row .sr-icon svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .settings-row .sr-body { flex: 1 1 auto; min-width: 0; }
        .settings-row .sr-title { font-size: 15px; font-weight: 600; color: #16233f; }
        .settings-row .sr-desc { font-size: 12.5px; color: rgba(22, 35, 63, 0.58); margin-top: 2px; }
        .settings-row .sr-desc.needs { color: #c2410c; }
        .model-dl-btn {
            flex: 0 0 auto;
            border: none;
            border-radius: 999px;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            background: #2563eb;
            cursor: pointer;
        }
        .model-dl-btn:disabled { background: rgba(37, 99, 235, 0.45); cursor: default; }
        .model-dl-btn.is-ready { background: #16a34a; }

        .switch { position: relative; flex: 0 0 auto; width: 50px; height: 30px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .switch .slider {
            position: absolute;
            inset: 0;
            border-radius: 999px;
            background: rgba(20, 40, 86, 0.22);
            transition: background 180ms ease;
        }
        .switch .slider::before {
            content: "";
            position: absolute;
            width: 24px;
            height: 24px;
            left: 3px;
            top: 3px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 2px 6px rgba(12, 28, 64, 0.3);
            transition: transform 180ms ease;
        }
        .switch input:checked + .slider { background: #2f6bff; }
        .switch input:checked + .slider::before { transform: translateX(20px); }

        .sidebar-backdrop {
            position: fixed;
            inset: 0;
            z-index: 44;
            background: rgba(8, 18, 42, 0.28);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 300ms ease;
        }

        body.app-mode.app-sidebar-open .sidebar-backdrop,
        #sidebarBackdrop.is-open {
            opacity: 1;
            pointer-events: auto;
        }

        .app-sidebar {
            position: fixed;
            inset: 0 auto 0 0;
            z-index: 45;
            width: min(304px, 84vw);
            pointer-events: none;
        }

        .app-sidebar-panel {
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: calc(18px + env(safe-area-inset-top)) 16px calc(18px + env(safe-area-inset-bottom));
            box-sizing: border-box;
            background: rgba(244, 248, 255, 0.58);
            backdrop-filter: blur(32px) saturate(1.35);
            -webkit-backdrop-filter: blur(32px) saturate(1.35);
            border-right: 1px solid rgba(255, 255, 255, 0.42);
            box-shadow: 18px 0 48px rgba(12, 28, 64, 0.18);
            transform: translateX(-104%);
            transition: transform 320ms cubic-bezier(0.22, 1, 0.36, 1);
            pointer-events: none;
            will-change: transform;
        }

        body.app-mode.app-sidebar-open .app-sidebar-panel,
        #appSidebar.is-open .app-sidebar-panel {
            transform: translateX(0);
            pointer-events: auto;
        }

        .sidebar-head {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
        }

        .sidebar-logo {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
        }

        .sidebar-head h2 {
            flex: 1;
            margin: 0;
            font-size: 22px;
            font-weight: 700;
            color: #16233f;
            letter-spacing: -0.02em;
        }

        .sidebar-close {
            width: 34px;
            height: 34px;
            border: 0;
            border-radius: 50%;
            background: rgba(20, 40, 86, 0.08);
            color: #16233f;
            font-size: 17px;
            cursor: pointer;
        }

        .sidebar-new-chat {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            margin-bottom: 18px;
            padding: 12px 14px;
            border: 1px solid rgba(47, 107, 255, 0.28);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.72);
            color: #2f6bff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 22px rgba(47, 107, 255, 0.12);
        }

        .sidebar-section {
            flex: 1 1 auto;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        .sidebar-section h3 {
            margin: 0 0 10px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: rgba(22, 35, 63, 0.48);
        }

        .sidebar-history {
            flex: 1 1 auto;

    <script>
        // Route haptics through the native Android vibrator. Samsung's WebView blocks
        // navigator.vibrate(), so we build a waveform (timings + amplitudes) and hand it
        // to the AndroidBridge, falling back to navigator.vibrate elsewhere.
        function buildHapticWaveform(pattern) {
            const timings = [];
            const amplitudes = [];
            (pattern || []).forEach((step) => {
                const delay = Math.max(0, Math.round(step.delay || 0));
                if (delay > 0) {
                    timings.push(delay);
                    amplitudes.push(0);
                }
                const duration = Math.max(0, Math.round(step.duration || 0));
                if (duration > 0) {
                    const intensity = step.intensity == null
                        ? 1
                        : Math.max(0, Math.min(1, step.intensity));
                    timings.push(duration);
                    amplitudes.push(Math.max(1, Math.round(intensity * 255)));
                }
            });
            return { timings, amplitudes };
        }

        window.haptics = {
            trigger(pattern) {
                try {
                    const { timings, amplitudes } = buildHapticWaveform(pattern);
                    if (!timings.length) return;
                    if (window.AndroidBridge && typeof window.AndroidBridge.vibrate === "function") {
                        window.AndroidBridge.vibrate(JSON.stringify(timings), JSON.stringify(amplitudes));
                        return;
                    }
                    if (typeof navigator !== "undefined" && typeof navigator.vibrate === "function") {
                        navigator.vibrate(timings);
                    }
                } catch (_error) {
                    /* haptics are best-effort */
                }
            }
        };

        window.triggerThinkingHaptics = () => {
            if (window.haptics) {
                window.haptics.trigger([
                    { duration: 35, intensity: 1 },
                    { delay: 85, duration: 10, intensity: 1 },
                    { delay: 50, duration: 50, intensity: 1 },
                    { delay: 50, duration: 50 },
                    { delay: 10, duration: 30 },
                    { delay: 60, duration: 50 },
                    { duration: 50 },
                    { delay: 30, duration: 50 },
                    { delay: 60, duration: 50 },
                    { delay: 20, duration: 50 },
                    { delay: 80, duration: 50, intensity: 1 },
                ]);
            }
        };

        window.triggerDoneHaptics = () => {
            if (window.haptics) {
                window.haptics.trigger([
                    { duration: 80, intensity: 0.8 },
                    { delay: 80, duration: 50, intensity: 0.69 },
                ]);
            }
        };

        window.triggerErrorHaptics = () => {
            if (window.haptics) {
                window.haptics.trigger([
                    { duration: 40, intensity: 0.7 },
                    { delay: 40, duration: 40, intensity: 0.7 },
                    { delay: 40, duration: 40, intensity: 0.9 },
                    { delay: 40, duration: 50, intensity: 0.6 },
                ]);
            }
        };

    <script>
        window.onTerminalStream = window.onTerminalStream || function () {};

            if (isAppMode) return;
            overlayClosing = false;
            clearTimeout(autoListenTimer);
            clearTimeout(silenceTimer);
            autoListenTimer = null;
            silenceTimer = null;
            if (window.AndroidBridge && typeof window.AndroidBridge.cancelDictation === "function") {
                window.AndroidBridge.cancelDictation();

            }
            if (chatList) {
                chatList.innerHTML = '<p id="chatEmpty" class="chat-empty">Start chatting with Dora.</p>';
            }
            if (composerInput) {
                composerInput.value = "";
                composerInput.blur();
            }
            closeQuickActions();
            updateComposerAction();
            applyVoiceState("idle");

        function cancelVoiceListen() {
            clearTimeout(autoListenTimer);

                window.AndroidBridge.cancelDictation();
            }

        function playUiChime(kind = "start") {
            try {
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                if (!AudioContextClass) return;
                const ctx = new AudioContextClass();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = "sine";
                osc.frequency.value = kind === "start" ? 880 : 520;
                gain.gain.setValueAtTime(0.0001, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.12, ctx.currentTime + 0.012);
                gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.11);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.12);
                setTimeout(() => ctx.close(), 180);
            } catch (_error) {
                // Best-effort UI chime only.
            }
        }

            const marker = "inference result=";
            const idx = `${rawChunk}`.indexOf(marker);
            if (idx < 0) return null;
            const jsonPart = `${rawChunk}`.slice(idx + marker.length).trim();
            try {
                return JSON.parse(jsonPart);
            } catch (_error) {
                return null;
            }
        }

        function parseLoaderCheckResult(rawChunk) {
            const marker = "loader check=";
            const idx = `${rawChunk}`.indexOf(marker);
            if (idx < 0) return null;
            const jsonPart = `${rawChunk}`.slice(idx + marker.length).trim();
            try {

            } catch (_error) {

        window.onTerminalStream = (channel, chunk) => {

            }
            if (isAppMode && channel === "agent") {
                const text = `${chunk || ""}`.trim();
                if (text) {
                    const normalized = text.replace(/^Final answer:\s*/i, "");
                    finalizeAssistant(normalized);
                }
            }
            if (channel === "model_registry") {
                handleModelRegistryStream(chunk);
            }
            if (channel === "local_ai" || channel === "backend") {
                const result = parseInferenceResult(chunk);
                if (result && result.ok) {
                    const outputText = `${result.output || ""}`.trim() || "Done.";
                    finalizeAssistant(outputText, result);
                } else if (result) {
                    const errText = `${result.output || ""}`.trim() ||
                        `Inference error: ${result.error || "request failed"}`;
                    finalizeAssistant(errText, result);
                    if (channel === "local_ai" && result.error) {

            setAppScreen("chat");
            const emptyState = document.getElementById("chatEmpty");
            if (emptyState && emptyState.parentElement) emptyState.remove();
            const card = document.createElement("div");
            card.className = "action-card is-loading";
            card.innerHTML =
                `<span class="ac-icon">${LUCIDE_ICONS.loader}</span>` +
                `<span class="ac-text">${escapeHtml(label || "Working\u2026")}</span>`;
            card._createdAt = Date.now();
            chatList.appendChild(card);
            chatList.scrollTop = chatList.scrollHeight;
            pendingActionCards.push(card);
        }

        function resolveActionCard(text, result) {
            const card = pendingActionCards.shift();
            if (!card) return false;
            const isDevice = !!(result && result.device_action);
            const isError = !!(result && result.ok === false);
            const minMs = 520;
            const elapsed = Date.now() - (card._createdAt || 0);
            const finish = () => {
                card.classList.remove("is-loading");
                if (isError) {
                    card.classList.add("is-error");
                    card.querySelector(".ac-icon").innerHTML = LUCIDE_ICONS.error;
                    card.querySelector(".ac-text").textContent = text;
                    if (window.triggerErrorHaptics) window.triggerErrorHaptics();
                } else if (isDevice) {
                    card.classList.add("is-done");
                    card.querySelector(".ac-icon").innerHTML = pickActionIcon(text);
                    card.querySelector(".ac-text").textContent = text;
                    if (window.triggerDoneHaptics) window.triggerDoneHaptics();
                    requestNaturalTts(text);
                } else {
                    // Conversational/writing answer: replace the card with a normal bubble.
                    card.remove();
                    appendChatMessage("assistant", text);
                    return;
                }
                chatList.scrollTop = chatList.scrollHeight;
            };
            if (elapsed < minMs) {
                setTimeout(finish, minMs - elapsed);
            } else {
                finish();
            }
            return true;
        }

        function finalizeAssistant(text, result) {
            if (!text) return;
            if (pendingActionCards.length > 0) {
                resolveActionCard(text, result);
            } else {
                appendChatMessage("assistant", text);
            }
        }

        function escapeHtml(value) {
            return `${value ?? ""}`
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function renderInlineMarkdown(value) {
            return escapeHtml(value)
                .replace(/`([^`]+)`/g, "<code>$1</code>")
                .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
                .replace(/\*([^*]+)\*/g, "<em>$1</em>");
        }

        function renderMarkdown(markdown) {
            const lines = `${markdown || ""}`.replace(/\r\n/g, "\n").split("\n");
            const blocks = [];
            let paragraph = [];
            let listItems = [];
            let orderedItems = [];
            let codeLines = [];
            let inCode = false;

            const flushParagraph = () => {
                if (paragraph.length > 0) {
                    blocks.push(`<p>${renderInlineMarkdown(paragraph.join(" "))}</p>`);
                    paragraph = [];
                }
            };
            const flushList = () => {
                if (listItems.length > 0) {
                    blocks.push(`<ul>${listItems.map((item) => `<li>${renderInlineMarkdown(item)}</li>`).join("")}</ul>`);
                    listItems = [];
                }
                if (orderedItems.length > 0) {
                    blocks.push(`<ol>${orderedItems.map((item) => `<li>${renderInlineMarkdown(item)}</li>`).join("")}</ol>`);
                    orderedItems = [];
                }
            };

            for (const line of lines) {
                if (line.trim().startsWith("```")) {
                    if (inCode) {
                        blocks.push(`<pre><code>${escapeHtml(codeLines.join("\n"))}</code></pre>`);
                        codeLines = [];
                        inCode = false;
                    } else {
                        flushParagraph();
                        flushList();
                        inCode = true;
                    }
                    continue;
                }
                if (inCode) {
                    codeLines.push(line);
                    continue;
                }

                const trimmed = line.trim();
                if (!trimmed) {
                    flushParagraph();
                    flushList();
                    continue;
                }

                const bullet = trimmed.match(/^[-*]\s+(.+)$/);
                const ordered = trimmed.match(/^\d+[.)]\s+(.+)$/);
                if (bullet) {
                    flushParagraph();
                    orderedItems = [];
                    listItems.push(bullet[1]);
                    continue;
                }
                if (ordered) {
                    flushParagraph();
                    listItems = [];
                    orderedItems.push(ordered[1]);
                    continue;
                }

                flushList();
                paragraph.push(trimmed);
            }

            if (inCode) {
                blocks.push(`<pre><code>${escapeHtml(codeLines.join("\n"))}</code></pre>`);
            }
            flushParagraph();
            flushList();
            return blocks.join("");
        }

        async function requestNaturalTts(text) {
            const spoken = `${text || ""}`.trim();
            if (!spoken || naturalTtsInFlight) return;
            if (!window.AndroidBridge || typeof window.AndroidBridge.requestNaturalTts !== "function") {
                playReplyChime();
                return;
            }
            if (typeof window.AndroidBridge.isVoiceResponsesEnabled === "function" &&
                !window.AndroidBridge.isVoiceResponsesEnabled()
            ) {
                playReplyChime();
                return;
            }
            naturalTtsInFlight = true;
            applyVoiceState("speaking");
            try {
                await Promise.resolve(window.AndroidBridge.requestNaturalTts(spoken));
            } catch (_error) {
                window.onTerminalStream("voice", "Natural TTS request failed.");
            } finally {
                naturalTtsInFlight = false;
                applyVoiceState("idle");
            }
        }

        async function playReplyChime() {
            const tryPlay = async (src) => {
                const audio = new Audio(src);
                audio.volume = 1;
                await audio.play();
            };
            try {
                await tryPlay("audio/dora_chime.wav");
            } catch (_wavError) {
                try {
                    await tryPlay("audio/dora_chime.mp3");
                } catch (_mp3Error) {
                    playUiChime("end");

            }
        }

                window.AndroidBridge.copyToClipboard(text);

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text)
                    .then(() => window.onTerminalStream("status", "Copied full action log to clipboard."))
                    .catch(() => window.onTerminalStream("error", "Clipboard copy failed."));
                return;
            }
            window.onTerminalStream("error", "No clipboard bridge available.");

        function formatSessionTime(timestamp) {
            const date = new Date(timestamp || Date.now());
            const now = new Date();
            const sameDay = date.toDateString() === now.toDateString();
            if (sameDay) {
                return date.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
            }
            return date.toLocaleDateString([], { month: "short", day: "numeric" });
        }

        function ensureActiveSession() {
            if (!isAppMode) return null;
            if (!activeSessionId) {
                activeSessionId = `s_${Date.now()}`;
                chatSessions.unshift({
                    id: activeSessionId,
                    title: "New chat",
                    messages: [],
                    updatedAt: Date.now()
                });
                saveChatSessions();
            }
            return chatSessions.find((session) => session.id === activeSessionId) || null;
        }

        function recordSessionMessage(role, text) {
            if (!isAppMode || !text) return;
            const session = ensureActiveSession();
            if (!session) return;
            session.messages.push({ role, text: `${text}`.slice(0, 4000) });
            if (role === "user" && session.title === "New chat") {
                session.title = `${text}`.slice(0, 48) + (`${text}`.length > 48 ? "\u2026" : "");
            }
            session.updatedAt = Date.now();
            chatSessions.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
            saveChatSessions();
            renderSidebarHistory();
        }

                button.innerHTML =

        const CONTEXT_SOURCE_ICONS = {
            notifications: '<svg viewBox="0 0 24 24"><path d="M10.268 21a2 2 0 0 0 3.464 0"/><path d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326"/></svg>',
            messages: '<svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>',
            calendar: '<svg viewBox="0 0 24 24"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>',
            contacts: '<svg viewBox="0 0 24 24"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>',
            usage: '<svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>'
        };

        const CONTEXT_SOURCES = [
            { key: "notifications", title: "Notifications", desc: "Recent alerts from your apps" },
            { key: "messages", title: "Messages", desc: "Incoming messages (read via notifications)" },
            { key: "calendar", title: "Calendar", desc: "Your upcoming events" },
            { key: "contacts", title: "Contacts", desc: "Find people to call or text by name" },
            { key: "usage", title: "App usage", desc: "Your most-used apps" }
        ];

        const MODEL_ROW_ICON = '<svg viewBox="0 0 24 24"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>';
        let modelRegistryEls = null;

        function formatGb(bytes) {
            return (bytes / (1024 * 1024 * 1024)).toFixed(2) + " GB";
        }

        function renderLocalModelRow() {
            const row = document.createElement("div");
            row.className = "settings-row";
            row.innerHTML =
                `<span class="sr-icon">${MODEL_ROW_ICON}</span>` +
                '<div class="sr-body"><div class="sr-title">Local AI model</div>' +
                '<div class="sr-desc">Checking model status…</div></div>' +
                '<button class="model-dl-btn" type="button" disabled>Download</button>';
            const desc = row.querySelector(".sr-desc");
            const btn = row.querySelector(".model-dl-btn");
            btn.addEventListener("click", () => {
                btn.disabled = true;
                btn.textContent = "Downloading…";
                desc.textContent = "Starting download…";
                dispatchAgentAction("model.registry_download");
            });
            modelRegistryEls = { desc, btn };
            return row;
        }

        function handleModelRegistryStream(chunk) {
            if (!modelRegistryEls) return;
            const { desc, btn } = modelRegistryEls;
            let payload = null;
            const text = `${chunk || ""}`.trim();
            try {
                payload = JSON.parse(text.startsWith("status=") ? text.slice(7) : text);
            } catch (_e) {
                return;
            }
            if (text.startsWith("status=")) {
                if (!payload.ok) {
                    desc.textContent = payload.error || "Registry unreachable.";
                    btn.disabled = true;
                } else if (payload.in_progress) {
                    desc.textContent = "Download in progress…";
                    btn.disabled = true;
                    btn.textContent = "Downloading…";
                } else if (payload.complete) {
                    desc.textContent = `On device · ${formatGb(payload.total_size)}`;
                    btn.disabled = true;
                    btn.textContent = "Installed";
                    btn.classList.add("is-ready");
                } else {
                    desc.textContent = `${formatGb(payload.total_size)} download required`;
                    btn.disabled = false;
                    btn.textContent = "Download";
                    btn.classList.remove("is-ready");
                }
                return;
            }
            switch (payload.state) {
                case "checking":
                    desc.textContent = "Contacting model registry…";
                    break;
                case "downloading":
                    desc.textContent = `Downloading ${payload.file || ""} · ${payload.pct || 0}%`;
                    btn.disabled = true;
                    btn.textContent = `${payload.pct || 0}%`;
                    break;
                case "verifying":
                    desc.textContent = "Verifying files…";
                    break;
                case "ready":
                    desc.textContent = `On device · ${formatGb(payload.total_bytes || 0)}`;
                    btn.disabled = true;
                    btn.textContent = "Installed";
                    btn.classList.add("is-ready");
                    break;
                case "error":
                    desc.textContent = payload.message || "Download failed.";
                    btn.disabled = false;
                    btn.textContent = "Retry";
                    break;
            }
        }

        function loadContextSettings() {
            if (!settingsList || !window.AndroidBridge || typeof window.AndroidBridge.getContextSettings !== "function") return;
            let data = null;
            try { data = JSON.parse(window.AndroidBridge.getContextSettings()); } catch (_e) { data = null; }
            const sources = (data && data.sources) || {};
            settingsList.innerHTML = "";
            settingsList.appendChild(renderLocalModelRow());
            dispatchAgentAction("model.registry_status");
            CONTEXT_SOURCES.forEach((src) => {
                const st = sources[src.key] || { enabled: false, granted: false };
                const needsPerm = st.enabled && !st.granted;
                const row = document.createElement("div");
                row.className = "settings-row";
                row.innerHTML =
                    `<span class="sr-icon">${CONTEXT_SOURCE_ICONS[src.key] || ""}</span>` +
                    `<div class="sr-body"><div class="sr-title">${src.title}</div>` +
                    `<div class="sr-desc ${needsPerm ? "needs" : ""}">${needsPerm ? "Tap the switch again to grant access" : src.desc}</div></div>` +
                    `<label class="switch"><input type="checkbox" ${st.enabled ? "checked" : ""}><span class="slider"></span></label>`;
                const input = row.querySelector("input");
                input.addEventListener("change", () => {
                    const enabled = input.checked;
                    try { window.AndroidBridge.setContextSource(src.key, enabled); } catch (_e) {}
                    if (enabled && !st.granted && typeof window.AndroidBridge.requestContextPermission === "function") {
                        window.AndroidBridge.requestContextPermission(src.key);
                    }
                    setTimeout(loadContextSettings, 500);
                });
                settingsList.appendChild(row);
            });
        }

        function openSettingsPanel() {
            if (!settingsPanel) return;
            loadContextSettings();
            settingsPanel.classList.add("is-open");
            settingsPanel.setAttribute("aria-hidden", "false");
        }

        function closeSettingsPanel() {
            if (!settingsPanel) return;
            settingsPanel.classList.remove("is-open");
            settingsPanel.setAttribute("aria-hidden", "true");
        }

        window.refreshContextSettingsIfOpen = function () {
            if (settingsPanel && settingsPanel.classList.contains("is-open")) {
                loadContextSettings();
            }
        };

        if (settingsClose) settingsClose.addEventListener("click", closeSettingsPanel);
        if (settingsPanel) {
            settingsPanel.addEventListener("click", (event) => {
                if (event.target === settingsPanel) closeSettingsPanel();
            });
        }
        document.addEventListener("visibilitychange", () => {
            if (!document.hidden && settingsPanel && settingsPanel.classList.contains("is-open")) {
                loadContextSettings();
            }
        });

        if (sidebarClose) sidebarClose.addEventListener("click", closeSidebar);
        if (sidebarBackdrop) {
            sidebarBackdrop.addEventListener("click", closeSidebar);
        }
        if (sidebarNewChat) sidebarNewChat.addEventListener("click", startNewChat);
        if (sidebarSettingsBtn) {
            sidebarSettingsBtn.addEventListener("click", () => {
                closeSidebar();
                openSettingsPanel();
            });
        }
        if (sidebarInferBtn) {
            sidebarInferBtn.addEventListener("click", () => {
                setInferMode(inferMode === "local" ? "cloud" : "local");
                updateSidebarInferLabel();
            });
        }

        if (menuBtn) {
            let menuTouchHandled = false;
            const handleMenuActivate = (event) => {
                if (!isAppMode) {
                    event.stopPropagation();
                    runMcpSmokeTest();
                    return;
                }
                event.preventDefault();
                event.stopPropagation();
                toggleSidebar(event);
            };
            menuBtn.addEventListener("touchend", (event) => {
                menuTouchHandled = true;
                handleMenuActivate(event);
                setTimeout(() => { menuTouchHandled = false; }, 500);
            }, { passive: false });
            menuBtn.addEventListener("click", (event) => {
                if (menuTouchHandled) {
                    event.preventDefault();
                    return;
                }
                handleMenuActivate(event);
            });
            menuBtn.addEventListener("contextmenu", (event) => {
                event.preventDefault();
                event.stopPropagation();
                if (isAppMode) return;
                window.debugMcpOpenSettings();
            });
        }

        if (isAppMode && backToGreetingBtn) {
            backToGreetingBtn.addEventListener("click", (event) => {
                event.stopPropagation();
                closeSidebar();
                closeQuickActions();
                setAppScreen("greeting");
                if (composerInput) {
                    composerInput.blur();
                }
            });
        }

        if (rootEl && bottomEl) {
            rootEl.addEventListener("click", (event) => {
                if (quickActions && quickActions.classList.contains("is-open") &&
                    !quickActions.contains(event.target) &&
                    !event.target.closest("#composerAddBtn")
                ) {
                    closeQuickActions();
                }
                if (isAppMode) {
                    if (document.body.classList.contains("app-sidebar-open") &&
                        !event.target.closest("#appSidebar") &&
                        !event.target.closest(".menu-btn")
                    ) {
                        closeSidebar();
                    }
                    return;
                }
                if (!bottomEl.contains(event.target)) {
                    dismissAssistant();
                }
            });
        }
    </script>
</body>
</html>
